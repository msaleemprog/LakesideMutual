syntax = "proto3";

package riskmanagement;

option java_multiple_files = true;
option java_package = "com.lakesidemutual.riskmanagement.grpc";
option java_outer_classname = "RiskManagementProto";


service RiskManagement {
  rpc Trigger (TriggerRequest) returns (stream TriggerReply) {}
}

message TriggerRequest {}

message TriggerReply {
  oneof report_or_progress {
    Report report = 1;
    int32 progress = 2;
  }
}

message Report {
  string csv = 1;
}