server:
  port: 8085

management:
  endpoints:
    web:
      exposure:
        include: health,info

spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:h2:mem:customer;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update

apikey:
  header: Authorization
  validkeys: dev-key

customercore:
  baseURL: http://localhost:8085

---
spring:
  config:
    activate:
      on-profile: migration
