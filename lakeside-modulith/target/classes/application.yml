server:
  port: 8085

spring:
  profiles:
    active:
      - customerselfservice-security
      - customerselfservice-customers
      - customerselfservice-cities

  config:
    import:
      - optional:classpath:application-customerselfservice.properties
      - optional:classpath:application-policymanagement.properties
  # ✅ One datasource definition only (avoid conflicts with imported properties)
  datasource:
    url: jdbc:h2:file:./data/customerselfservice;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: sa

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    show-sql: false
    hibernate:
      # ✅ safer for local dev; keeps schema between restarts
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect

  jms:
    listener:
      # ✅ listeners won't start automatically (good during migration)
      auto-startup: false

  activemq:
    # ✅ avoid vm:// (and match your original intent)
    broker-url: tcp://localhost:61616
    user: queueuser
    password: secret

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    jms:
      enabled: false

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.security.web.FilterChainProxy: DEBUG

