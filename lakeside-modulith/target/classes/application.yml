server:
  port: 8085

spring:
  profiles:
    active:
      - customerselfservice-security
      - customerselfservice-customers
      - customerselfservice-cities

  config:
    import: optional:classpath:application-customerselfservice.properties

  # ✅ One datasource definition only (avoid conflicts with imported properties)
  datasource:
    url: jdbc:h2:file:./customerselfservice
    driver-class-name: org.h2.Driver
    username: sa
    password: sa

  jpa:
    show-sql: false
    hibernate:
      # ✅ safer for local dev; keeps schema between restarts
      ddl-auto: update

  jms:
    listener:
      # ✅ listeners won't start automatically (good during migration)
      auto-startup: false

  activemq:
    # ✅ avoid vm:// (and match your original intent)
    broker-url: tcp://localhost:61616
    user: queueuser
    password: secret

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    jms:
      enabled: false
