server:
  port: 8085

spring:
  profiles:
    active: 
      - customerselfservice-security
      - customerselfservice-customers
      - customerselfservice-cities
  datasource:
    url: jdbc:h2:mem:customer;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
  config:
    import: optional:classpath:application-customerselfservice.properties
  jms:
    listener:
      auto-startup: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
