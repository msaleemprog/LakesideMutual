#
# This is a docker-compose file to build and start all Lakeside Mutual
# applications in a single command. Note that the applications will all
# run in production mode, so there won't be any live-reloading of changes
# or other development features. For development, we recommend to start
# the applications invidually or use the run_all_applications scripts.
#
# To build the Docker images:
#   docker-compose build
#
# To run the applications:
#   docker-compose up
#
# Note that you might have to adjust the REACT_APP_ and VUE_APP environment
# variables pointing to the backend services, depending on your hosting
# environment. By default, they point to localhost, which is fine when running 
# the services locally. In a cloud deployment, these should be changed to the 
# public domainname of the respective backend service.
# 
# To shut down the applications, simply terminate the previous command.
#

version: "3"
services:
  spring-boot-admin:
    build: spring-boot-admin
    image: lakesidemutual/spring-boot-admin
    ports:
      - "9000:9000"
    environment:
      - OTEL_SERVICE_NAME=spring-boot-admin
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_TRACES_EXPORTER=otlp
      - JAVA_TOOL_OPTIONS=-javaagent:/otel/opentelemetry-javaagent.jar
    volumes:
      - ./otel/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar:ro


  customer-core:
    build: customer-core
    image: lakesidemutual/customer-core
    environment:
      - "SPRING_BOOT_ADMIN_CLIENT_URL=http://spring-boot-admin:9000"
      - OTEL_SERVICE_NAME=customer-core
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_INSTRUMENTATION_COMMON_PEER_SERVICE_MAPPING=customer-core:8110=customer-core,policy-management-backend:8090=policy-management-backend,customer-management-backend:8100=customer-management-backend,customer-self-service-backend:8080=customer-self-service-backend,spring-boot-admin:9000=spring-boot-admin,risk-management-server:50051=risk-management-server
      - JAVA_TOOL_OPTIONS=-javaagent:/otel/opentelemetry-javaagent.jar
    volumes:
      - ./otel/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar:ro
    ports:
      - "8110:8110"

  customer-management-backend:
    build: customer-management-backend
    image: lakesidemutual/customer-management-backend
    depends_on:
      - customer-core
    environment:
      - "CUSTOMERCORE_BASEURL=http://customer-core:8110"
      - "SPRING_BOOT_ADMIN_CLIENT_URL=http://spring-boot-admin:9000"
      - OTEL_SERVICE_NAME=customer-management-backend
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_INSTRUMENTATION_COMMON_PEER_SERVICE_MAPPING=customer-core:8110=customer-core,policy-management-backend:8090=policy-management-backend,customer-management-backend:8100=customer-management-backend,customer-self-service-backend:8080=customer-self-service-backend,spring-boot-admin:9000=spring-boot-admin,risk-management-server:50051=risk-management-server
      - JAVA_TOOL_OPTIONS=-javaagent:/otel/opentelemetry-javaagent.jar
    volumes:
      - ./otel/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar:ro
    ports:
      - "8100:8100"

  customer-management-frontend:
    build: customer-management-frontend
    image: lakesidemutual/customer-management-frontend
    depends_on:
      - customer-management-backend
    environment:
      - "REACT_APP_CUSTOMER_SELF_SERVICE_BACKEND=http://localhost:8080"
      - "REACT_APP_CUSTOMER_MANAGEMENT_BACKEND=http://localhost:8100"
      - "REACT_APP_POLICY_MANAGEMENT_FRONTEND=http://localhost:3010"
    ports:
      - "3020:80"

  policy-management-backend:
    build: policy-management-backend
    image: lakesidemutual/policy-management-backend
    depends_on:
      - customer-core
    environment:
      - "CUSTOMERCORE_BASEURL=http://customer-core:8110"
      - "SPRING_BOOT_ADMIN_CLIENT_URL=http://spring-boot-admin:9000"
      - OTEL_SERVICE_NAME=policy-management-backend
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_INSTRUMENTATION_COMMON_PEER_SERVICE_MAPPING=customer-core:8110=customer-core,policy-management-backend:8090=policy-management-backend,customer-management-backend:8100=customer-management-backend,customer-self-service-backend:8080=customer-self-service-backend,spring-boot-admin:9000=spring-boot-admin,risk-management-server:50051=risk-management-server
      - JAVA_TOOL_OPTIONS=-javaagent:/otel/opentelemetry-javaagent.jar
    volumes:
      - ./otel/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar:ro
    ports:
      - "8090:8090"
      - "61613:61613"
      - "61616:61616"

  policy-management-frontend:
    build: policy-management-frontend
    image: lakesidemutual/policy-management-frontend
    depends_on:
      - policy-management-backend
    environment:
      - "VUE_APP_POLICY_MANAGEMENT_BACKEND=http://localhost:8090"
    ports:
      - "3010:80"

  customer-self-service-backend:
    build: customer-self-service-backend
    image: lakesidemutual/customer-self-service-backend
    depends_on:
      - customer-core
      - policy-management-backend
    environment:
      - "CUSTOMERCORE_BASEURL=http://customer-core:8110"
      - "POLICYMANAGEMENT_TCPBROKERBINDADDRESS=tcp://policy-management-backend:61616"
      - "SPRING_BOOT_ADMIN_CLIENT_URL=http://spring-boot-admin:9000"
      - OTEL_SERVICE_NAME=customer-self-service-backend
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_INSTRUMENTATION_COMMON_PEER_SERVICE_MAPPING=customer-core:8110=customer-core,policy-management-backend:8090=policy-management-backend,customer-management-backend:8100=customer-management-backend,customer-self-service-backend:8080=customer-self-service-backend,spring-boot-admin:9000=spring-boot-admin,risk-management-server:50051=risk-management-server
      - JAVA_TOOL_OPTIONS=-javaagent:/otel/opentelemetry-javaagent.jar
    volumes:
      - ./otel/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar:ro
    ports:
      - "8080:8080"

  customer-self-service-frontend:
    build: customer-self-service-frontend
    image: lakesidemutual/customer-self-service-frontend
    depends_on:
      - customer-self-service-backend
      - customer-management-backend
      - policy-management-backend
    environment:
      - "REACT_APP_CUSTOMER_SELF_SERVICE_BACKEND=http://localhost:8080"
      - "REACT_APP_POLICY_MANAGEMENT_BACKEND=http://localhost:8090"
      - "REACT_APP_CUSTOMER_MANAGEMENT_BACKEND=http://localhost:8100"
    ports:
      - "3000:80"
      
  risk-management-server:
    build: risk-management-server
    image: lakesidemutual/risk-management-server
    depends_on:
      - policy-management-backend
    environment:
      - "ACTIVEMQ_HOST=policy-management-backend"
      - "ACTIVEMQ_PORT=61613"
      - OTEL_SERVICE_NAME=risk-management-server
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_LOG_LEVEL=debug
      - OTEL_INSTRUMENTATION_COMMON_PEER_SERVICE_MAPPING=customer-core:8110=customer-core,policy-management-backend:8090=policy-management-backend,customer-management-backend:8100=customer-management-backend,customer-self-service-backend:8080=customer-self-service-backend,spring-boot-admin:9000=spring-boot-admin,risk-management-server:50051=risk-management-server
    ports:
      - "50051:50051"

  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "14250:14250"
      - "14268:14268"
    
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - jaeger








